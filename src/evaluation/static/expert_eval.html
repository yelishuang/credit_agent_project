<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreditAgent 专家评测</title>
<style>
:root {
  --bg: #f5f7fa; --card-bg: #fff; --text: #1a1a2e;
  --border: #e2e8f0; --primary: #6366f1; --primary-dark: #4f46e5;
  --green: #10b981; --yellow: #f59e0b; --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
.header {
  background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
  color: #fff; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between;
}
.header h1 { font-size: 1.4rem; font-weight: 600; }
.header-right { display: flex; align-items: center; gap: 16px; }
.header input {
  padding: 6px 12px; border-radius: 6px; border: none; font-size: 0.9rem;
  background: rgba(255,255,255,0.2); color: #fff; outline: none;
}
.header input::placeholder { color: rgba(255,255,255,0.6); }
.progress-bar { height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; width: 200px; }
.progress-fill { height: 100%; background: #fff; border-radius: 2px; transition: width 0.3s; }
.progress-text { font-size: 0.85rem; opacity: 0.9; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }
.question-box {
  background: var(--card-bg); border-radius: var(--radius); padding: 20px 24px;
  box-shadow: var(--shadow); margin-bottom: 20px; border-left: 4px solid var(--primary);
}
.question-box .label { font-size: 0.8rem; color: #64748b; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.question-box .text { font-size: 1.05rem; line-height: 1.6; }
.cards { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.card {
  background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow);
  overflow: hidden; transition: box-shadow 0.2s, transform 0.2s; border: 2px solid transparent;
}
.card.selected { border-color: var(--green); box-shadow: 0 0 0 3px rgba(16,185,129,0.2); }
.card-header { padding: 14px 20px; font-weight: 600; font-size: 1rem; border-bottom: 1px solid var(--border); background: #fafbfc; }
.card-body { padding: 16px 20px; max-height: 55vh; overflow-y: auto; }
.msg { margin-bottom: 14px; }
.msg-role { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.msg-role.user { color: var(--primary); }
.msg-role.assistant { color: #059669; }
.msg-content { font-size: 0.92rem; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
.msg-content code, .tool-block { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-family: "Fira Code", monospace; font-size: 0.85rem; }
.tool-block { display: block; padding: 10px 14px; margin: 8px 0; overflow-x: auto; white-space: pre-wrap; border-left: 3px solid #94a3b8; }
.actions { display: flex; justify-content: center; gap: 16px; }
.btn {
  padding: 12px 32px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
  cursor: pointer; transition: all 0.15s; color: #fff;
}
.btn-a { background: var(--primary); }
.btn-a:hover { background: var(--primary-dark); transform: translateY(-1px); }
.btn-tie { background: #64748b; }
.btn-tie:hover { background: #475569; transform: translateY(-1px); }
.btn-b { background: #8b5cf6; }
.btn-b:hover { background: #7c3aed; transform: translateY(-1px); }
.flash { animation: flashGreen 0.5s; }
@keyframes flashGreen { 0%,100% { background: var(--card-bg); } 50% { background: #d1fae5; } }
.done-msg { text-align: center; font-size: 1.3rem; color: var(--green); font-weight: 600; padding: 40px; }
@media (max-width: 768px) { .cards { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="header">
  <h1>CreditAgent 专家盲评</h1>
  <div class="header-right">
    <input id="evaluator" type="text" placeholder="评测者姓名">
    <div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">0 / 0</div>
    </div>
  </div>
</div>
<div class="container">
  <div class="question-box">
    <div class="label" id="caseLabel">测试用例</div>
    <div class="text" id="questionText">加载中...</div>
  </div>
  <div class="cards">
    <div class="card" id="cardA"><div class="card-header">Model A</div><div class="card-body" id="bodyA"></div></div>
    <div class="card" id="cardB"><div class="card-header">Model B</div><div class="card-body" id="bodyB"></div></div>
  </div>
  <div class="actions" id="actions">
    <button class="btn btn-a" onclick="choose('A')">← A 更好</button>
    <button class="btn btn-tie" onclick="choose('tie')">↓ 平局</button>
    <button class="btn btn-b" onclick="choose('B')">B 更好 →</button>
  </div>
  <div class="done-msg" id="doneMsg" style="display:none;">评测完成！感谢参与。</div>
</div>
<script>
let testCases=[], responses={}, currentIdx=0, assignments=[], results=[];

async function init() {
  const resp = await fetch('/api/data');
  const data = await resp.json();
  testCases = data.test_cases;
  responses = data.responses;
  // 为每条用例随机分配 A/B 位置
  assignments = testCases.map(() => Math.random() < 0.5 ? {A:'base',B:'finetuned'} : {A:'finetuned',B:'base'});
  render();
}

function formatMessages(msgs) {
  let html = '';
  for (const m of msgs) {
    if (m.role === 'system') continue;
    const role = m.role === 'user' ? 'user' : 'assistant';
    let content = escapeHtml(m.content);
    // 高亮 tool_call 和 tool_response
    content = content.replace(/&lt;tool_call&gt;([\s\S]*?)&lt;\/tool_call&gt;/g, '<div class="tool-block">🔧 Tool Call\n$1</div>');
    content = content.replace(/&lt;tool_response&gt;([\s\S]*?)&lt;\/tool_response&gt;/g, '<div class="tool-block">📋 Tool Response\n$1</div>');
    html += `<div class="msg"><div class="msg-role ${role}">${role}</div><div class="msg-content">${content}</div></div>`;
  }
  return html;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  if (currentIdx >= testCases.length) {
    document.getElementById('actions').style.display = 'none';
    document.getElementById('doneMsg').style.display = 'block';
    return;
  }
  const tc = testCases[currentIdx];
  const assign = assignments[currentIdx];
  document.getElementById('caseLabel').textContent = `${tc.id} (${tc.type_label || tc.type}) — ${currentIdx+1}/${testCases.length}`;
  document.getElementById('questionText').textContent = tc.user_message;
  document.getElementById('bodyA').innerHTML = formatMessages(responses[assign.A][currentIdx].messages);
  document.getElementById('bodyB').innerHTML = formatMessages(responses[assign.B][currentIdx].messages);
  document.getElementById('cardA').classList.remove('selected','flash');
  document.getElementById('cardB').classList.remove('selected','flash');
  // 更新进度
  const pct = (currentIdx / testCases.length * 100).toFixed(0);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${currentIdx} / ${testCases.length}`;
}

async function choose(choice) {
  const assign = assignments[currentIdx];
  let winner;
  if (choice === 'tie') winner = 'tie';
  else if (choice === 'A') winner = assign.A;
  else winner = assign.B;

  const card = choice === 'A' ? 'cardA' : choice === 'B' ? 'cardB' : null;
  if (card) { document.getElementById(card).classList.add('selected','flash'); }

  const result = {
    test_id: testCases[currentIdx].id,
    type: testCases[currentIdx].type,
    evaluator: document.getElementById('evaluator').value || 'anonymous',
    choice: choice,
    winner: winner,
    assignment: assign,
    timestamp: new Date().toISOString(),
  };
  results.push(result);
  await fetch('/api/result', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(result)});

  setTimeout(() => { currentIdx++; render(); }, 400);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') choose('A');
  else if (e.key === 'ArrowDown') choose('tie');
  else if (e.key === 'ArrowRight') choose('B');
});

init();
</script>
</body>
</html>
